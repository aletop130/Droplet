name: Nightly Ingest

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync topology to Neo4j
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: python ingestion/scripts/sync_topology_to_neo4j.py

      - name: Simulate tank placement
        env:
          SUPABASE_POOLER: ${{ secrets.SUPABASE_POOLER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: python ingestion/scripts/simulate_tank_placement.py

      - name: Build network
        env:
          SUPABASE_POOLER: ${{ secrets.SUPABASE_POOLER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: python ingestion/scripts/build_network.py