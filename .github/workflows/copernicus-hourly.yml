name: Copernicus Hourly Ingest

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend ingest
        run: |
          curl --fail --show-error --silent -X POST "${HF_SPACE_URL}/api/copernicus/ingest"
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
